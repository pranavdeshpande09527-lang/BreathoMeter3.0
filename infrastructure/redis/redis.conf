# BreathoMeter Redis Configuration
# Cache-only mode — no persistence

# ─── Network ─────────────────────────────────
bind 0.0.0.0
port 6379
protected-mode no

# ─── Memory Management ───────────────────────
maxmemory 512mb
maxmemory-policy allkeys-lru

# ─── Persistence (DISABLED for cache-only) ───
save ""
appendonly no

# ─── Performance ─────────────────────────────
tcp-backlog 511
timeout 0
tcp-keepalive 300
databases 2

# ─── Lazy Freeing ────────────────────────────
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# ─── Logging ─────────────────────────────────
loglevel notice
logfile ""
